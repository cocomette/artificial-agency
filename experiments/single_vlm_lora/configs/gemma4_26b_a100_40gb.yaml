run_name: gemma4-26b-a100-40gb
dry_run: false
frame_history_n: 4
palette_size: 16
frame_size: 64x64

model:
  backend: hf
  model_id: google/gemma-4-26B-A4B-it
  device: auto
  dtype: bf16
  attn_implementation: sdpa
  gradient_checkpointing: true
  image_size: 256x256
  action_selection: sample
  temperature: 0.8
  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    save_every: 10

environment:
  game_id: ls20-9607627b
  game_index: 3
  max_turns: 20
  seed: 0
  operation_mode: offline
  environments_dir: environment_files
  recordings_dir: recordings
  save_recording: false

rewards:
  score_weight: 10.0
  learning_progress_weight: 10.0
  action_cost: 0.02
  time_cost_weight: 0.001
  update_cost: 0.01

update:
  learning_rate: 0.0001
  update_steps: 1
  gradient_clip_norm: 1.0
  world_loss_mode: latent_grid
  next_frame_loss_weight: 1.0
  latent_loss_weight: 1.0
  latent_changed_patch_weight: 6.0
  latent_huber_beta: 1.0
  latent_cosine_loss_weight: 0.1
  latent_cosine_min_delta_norm: 0.0001
  latent_learning_progress_normalization: true
  latent_learning_progress_normalization_floor: 0.01
  policy_loss_weight: 0.05
  coord_loss_weight: 0.01
  holdout_min_transitions: 1
  learning_progress_horizon: 4
  learning_progress_discount: 0.8
  learning_progress_rate_beta: 0.5
  reward_baseline_beta: 0.9
  policy_warmup_turns: 3
  policy_clip_epsilon: 0.2

logging:
  output_dir: runs/single_vlm_lora/gemma4_26b_a100_40gb
  save_latent_predictions: true
