name: PR Regression

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  branch-name:
    name: Branch name
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Validate PR source branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          BRANCH_PATTERN: ^(main|dependabot/.+|(feat|fix|docs|test|refactor|chore|ci|audit|release|wp)/[a-z0-9][a-z0-9-]{1,80})$
        run: |
          if [[ ! "$BRANCH_NAME" =~ $BRANCH_PATTERN ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            echo
            echo "Use one of:"
            echo "  feat/<short-kebab-summary>"
            echo "  fix/<short-kebab-summary>"
            echo "  docs/<short-kebab-summary>"
            echo "  test/<short-kebab-summary>"
            echo "  refactor/<short-kebab-summary>"
            echo "  chore/<short-kebab-summary>"
            echo "  ci/<short-kebab-summary>"
            echo "  audit/<short-kebab-summary>"
            echo "  release/<short-kebab-summary>"
            echo "  wp/<work-package-or-step-summary>"
            echo
            echo "Examples:"
            echo "  feat/model-free-pr-gate"
            echo "  fix/sqlite-memory-cleanup"
            echo "  ci/pr-regression-gate"
            exit 1
          fi

  model-free-pytest:
    name: Model-free pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --locked --group test --no-dev

      - name: Run model-free regression tests
        run: uv run --locked --group test --no-dev python -m pytest -q
