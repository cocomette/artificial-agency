# Kaggle RTX 6000 parallel submission run: every available evaluation game runs
# concurrently against one shared local vLLM-served Qwen3.6 FP8 model.
operation_mode: competition
game_selection: all_available
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: ""
recordings_dir: /kaggle/working/server_recording
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: false
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never

max_parallel_games: null
max_game_retries: 0
max_actions_per_level: 10000

world_action_history_window: 20
historizer_action_history_window: 20
probing_action_history_window: 5
policy_action_history_window: 5

agent_context_history_window: 10

probing_actions_window: 3
policy_actions_window: 1
probing_mode_cap_ratio: 0.40

models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    input_image_size: 2048x2048
    input_image_resample: nearest
    timeout: 1200
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.1
    server:
      host: 127.0.0.1
      port: 8000
      model_path: /kaggle/input/face-of-agi-qwen36-35b-fp8-weights
      max_model_len: 32768
      reasoning_parser: qwen3
      extra_args:
        - --gpu-memory-utilization
        - "0.90"
        - --max-num-seqs
        - "64"
        - --max-num-batched-tokens
        - "32768"
        - --disable-log-stats
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - "{}"
  agent:
    backend: vllm
    include_output_schema_in_instructions: true
    options:
      temperature: 0.2
      chat_template_kwargs:
        enable_thinking: false
  change:
    backend: vllm
    max_completion_tokens: 4096
    input_image_crop_arc_grid_edges: 3
    animation_frame_budget_coefficient: 2
    gaussian_blur_kernel_size: 0
    gaussian_noise_deviation: 0
    frame_input_mode: image
    activate_diff_mask: false
    activate_bounding_boxes: false
    activate_components: true
    max_nb_components: 50
    max_frames_per_call: 10
    dilation_bounding_boxes: 9
    width_bounding_boxes: 10
    include_output_schema_in_instructions: true
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  world:
    backend: vllm
    max_completion_tokens: 4096
    input_image_crop_arc_grid_edges: 3
    include_output_schema_in_instructions: true
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  historizer:
    backend: vllm
    max_completion_tokens: 3072
    include_output_schema_in_instructions: true
    options:
      temperature: 0.1
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  level_summary:
    backend: vllm
    max_completion_tokens: 3072
    include_output_schema_in_instructions: true
    options:
      temperature: 0.1
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  updater:
    general:
      backend: vllm
      max_completion_tokens: 3072
      input_image_crop_arc_grid_edges: 3
      include_output_schema_in_instructions: true
    agent_probing:
      backend: vllm
      max_completion_tokens: 3072
      input_image_crop_arc_grid_edges: 3
      include_output_schema_in_instructions: true
      options:
        temperature: 0.2
        thinking_token_budget: 1024
        chat_template_kwargs:
          enable_thinking: true
    agent_policy:
      backend: vllm
      max_completion_tokens: 3072
      input_image_crop_arc_grid_edges: 3
      include_output_schema_in_instructions: true
      options:
        temperature: 0.2
        thinking_token_budget: 2048
        chat_template_kwargs:
          enable_thinking: true
