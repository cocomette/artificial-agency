# Kaggle RTX 6000 parallel submission run: every available evaluation game runs
# concurrently against one shared local vLLM-served Qwen3.6 FP8 model.
operation_mode: competition
game_selection: all_available
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: ""
recordings_dir: /kaggle/working/server_recording
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: false
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never

max_parallel_games: 25  # KEEP
max_game_retries: 0

agent_action_history_window: 10
agent_updater_action_history_window: 20
agent_context_history_window: 10

animation_keyframe_pixel_threshold: 20
max_actions_per_level: 1000

action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    input_image_size: 2048x2048
    input_image_resample: nearest
    timeout: 1800
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.1
    server:
      host: 127.0.0.1
      port: 8000
      model_path: /kaggle/input/face-of-agi-qwen36-35b-fp8-weights
      max_model_len: 65536
      reasoning_parser: qwen3
      extra_args:
        - --gpu-memory-utilization
        - "0.90"
        - --max-num-batched-tokens
        - "65536"
        - --max-num-seqs
        - "128"
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - "{}"
  agent:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    include_output_schema_in_instructions: false
    options:
      temperature: 0.2
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  change:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    summary_max_chars: 2000
    repair_invalid_output_preview_chars: 8000
    include_output_schema_in_instructions: false
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  historizer:
    backend: vllm
    field_max_chars: 2000
    repair_invalid_output_preview_chars: 8000
    include_output_schema_in_instructions: false
  memory:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    memory_max_chars: 10000
    repair_invalid_output_preview_chars: 8000
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  updater:
    general:
      backend: vllm
      general_context_max_chars: 20000
      repair_invalid_output_preview_chars: 8000
      include_output_schema_in_instructions: false
    agent:
      backend: vllm
      input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
      agent_game_context_max_chars: 12000
      agent_game_context_field_max_chars: 6000
      repair_invalid_output_preview_chars: 8000
      include_output_schema_in_instructions: false
      options:
        temperature: 0.2
        thinking_token_budget: 2048
        chat_template_kwargs:
          enable_thinking: true
