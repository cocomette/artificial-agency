# Kaggle RTX 6000 public-game debug run: a small public batch runs
# concurrently against one shared local vLLM-served Qwen3.6 FP8 model.
operation_mode: offline
game_catalog_path: /kaggle/input/face-of-agi-public-games/local_games.json
environments_dir: /kaggle/input/face-of-agi-public-games/environment_files
recordings_dir: /kaggle/working/recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never
live_turn_monitor: true

max_parallel_games: 25
max_game_retries: 1
game_selection: all_available

agent_action_history_window: 10
agent_updater_action_history_window: 20
agent_context_history_window: 10

animation_keyframe_pixel_threshold: 20  # 0.5%
max_actions_per_level: 1000
max_levels_per_game: 10

action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

reward_action_penalty: 0.0
reward_trace_seconds_penalty: 0.0
reward_input_token_penalty_per_1k: 0.0
reward_output_token_penalty_per_1k: 0.0


models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    input_image_size: 2048x2048
    input_image_resample: nearest
    timeout: 1200
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.1
    server:
      host: 127.0.0.1
      port: 8000
      model_path: /kaggle/input/face-of-agi-qwen36-35b-fp8-weights
      max_model_len: 32768
      reasoning_parser: qwen3
      extra_args:
        - --gpu-memory-utilization
        - "0.90"
        - --max-num-seqs
        - "128"
        - --max-num-batched-tokens
        - "32768"
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --uvicorn-log-level
        - "error"
        - --no-enable-log-requests
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - "{}"
  agent:
    backend: vllm
    input_image_crop_arc_grid_edges: 3
    max_completion_tokens: 16384
    options:
      temperature: 0.2
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  change:
    backend: vllm
    input_image_crop_arc_grid_edges: 3
    max_completion_tokens: 16384
    options:
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  memory:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
  world:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  goal:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  interest:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024
  reward_judge:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024

