# Modal H100 full game-loop run: all v1 roles share one vLLM-served
# Qwen3.5 122B-A10B GPTQ Int4 model.
#
# This variant caps image and context size aggressively so the 122B GPTQ model
# has enough headroom for KV cache on a single H100.
game_index: 3
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true

enable_visualization: false
render_mode: null
debug_trace: null
debug_color: always

agent_action_history_window: 20
agent_updater_action_history_window: 20
agent_context_history_window: 8
max_actions_per_level: 100

reward_action_penalty: 0.0
reward_trace_seconds_penalty: 0.0
reward_input_token_penalty_per_1k: 0.0
reward_output_token_penalty_per_1k: 0.0

models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.5-122B-A10B-GPTQ-Int4
    base_url: http://127.0.0.1:8000/v1
    api_key: EMPTY
    input_image_size: 512x512
    input_image_resample: nearest
    temperature: 0
    # max_tokens: 900
    server:
      host: 127.0.0.1
      port: 8000
      max_model_len: 8192
      reasoning_parser: qwen3
      extra_args:
        - --enforce-eager
        - --max-num-seqs
        - "1"
        - --max-num-batched-tokens
        - "2048"
        - --gpu-memory-utilization
        - "0.95"
        - --gdn-prefill-backend
        - triton
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
  agent:
    backend: vllm
    max_tool_calls: 0
    repair_attempts: 2
    temperature: 0.3
    include_output_schema_in_instructions: true
  change:
    backend: vllm
    include_output_schema_in_instructions: true
  memory:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
  world:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  goal:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  interest:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024
  reward_judge:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024

