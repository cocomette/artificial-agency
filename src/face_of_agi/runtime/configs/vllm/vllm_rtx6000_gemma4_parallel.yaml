# Kaggle RTX 6000 parallel submission run: every available evaluation game runs
# concurrently against one shared local vLLM-served Qwen3.6 FP8 model.
operation_mode: competition
game_selection: all_available
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: ""
recordings_dir: /kaggle/working/server_recording
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: false
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never

max_parallel_games: null
max_game_retries: 1

agent_action_history_window: 10
agent_updater_action_history_window: 20
agent_context_history_window: 10

animation_keyframe_pixel_threshold: 30
max_actions_per_level: 100
max_levels_per_game: 10

action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

reward_action_penalty: 0.0
reward_trace_seconds_penalty: 0.0
reward_input_token_penalty_per_1k: 0.0
reward_output_token_penalty_per_1k: 0.0

models:
  shared_vlm:
    backend: vllm
    model: google/gemma-4-31B-it-qat-w4a16-ct
    input_image_size: 1792x1792
    input_image_resample: nearest
    timeout: 1200
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.1
    server:
      host: 127.0.0.1
      port: 8000
      model_path: /kaggle/input/face-of-agi-gemma4-31b-it-qat-w4a16-ct-weights
      max_model_len: 32768
      reasoning_parser: gemma4
      extra_args:
        - --gpu-memory-utilization
        - "0.90"
        - --max-num-seqs
        - "128"
        - --limit-mm-per-prompt
        - '{"image": 2}'
        - --mm-processor-kwargs
        - '{"max_soft_tokens": 1120}'
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - '{"reasoning_start_str":"<|channel>","reasoning_end_str":"<channel|>"}'
  agent:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: false
    options:
      temperature: 0.2
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  change:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: false
    options:
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  memory:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
  world:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  goal:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  interest:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024
  reward_judge:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024

