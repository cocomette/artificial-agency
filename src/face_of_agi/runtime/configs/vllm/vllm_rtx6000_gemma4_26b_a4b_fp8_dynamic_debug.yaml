# Kaggle RTX 6000 public-game debug run using the RedHatAI Gemma 4 26B
# A4B FP8 Dynamic snapshot uploaded as a private Kaggle Dataset.
operation_mode: offline
game_catalog_path: /kaggle/input/face-of-agi-public-games/local_games.json
environments_dir: /kaggle/input/face-of-agi-public-games/environment_files
recordings_dir: /kaggle/working/recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never
live_turn_monitor: true

max_parallel_games: null
max_game_retries: 1
game_selection: all_available

agent_action_history_window: 10
agent_updater_action_history_window: 20
agent_context_history_window: 10

animation_keyframe_pixel_threshold: 20
max_actions_per_level: 1000

action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

models:
  shared_vlm:
    backend: vllm
    model: RedHatAI/gemma-4-26B-A4B-it-FP8-Dynamic
    input_image_size: 1748x1748
    input_image_resample: nearest
    timeout: 1200
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.1
    server:
      model_path: /kaggle/input/face-of-agi-gemma4-26b-a4b-it-fp8-dynamic-weights
      max_model_len: 65536
      reasoning_parser: gemma4
      extra_args:
        - --gpu-memory-utilization
        - "0.90"
        - --max-num-batched-tokens
        - "65536"
        - --max-num-seqs
        - "64"
        - --mm-processor-kwargs
        - '{"max_soft_tokens": 1120}'
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - '{"reasoning_start_str":"<|channel>","reasoning_end_str":"<channel|>"}'
  agent:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    include_output_schema_in_instructions: false
    options:
      temperature: 0.2
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  change:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    include_output_schema_in_instructions: false
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  historizer:
    backend: vllm
    include_output_schema_in_instructions: false
  updater:
    general:
      backend: vllm
      include_output_schema_in_instructions: false
    agent:
      backend: vllm
      input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
      include_output_schema_in_instructions: false
      options:
        temperature: 0.2
        thinking_token_budget: 2048
        chat_template_kwargs:
          enable_thinking: true
