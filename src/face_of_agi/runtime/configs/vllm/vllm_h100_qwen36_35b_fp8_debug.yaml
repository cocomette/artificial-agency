# Modal H100 public-game debug run mirroring the Kaggle RTX 6000 debug shape.
# It runs all known games concurrently against one shared local vLLM-served
# Qwen3.6 FP8 model, but uses Modal-local paths and H100 startup flags.
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: /vol/runs/recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never
live_turn_monitor: true

max_parallel_games: 25
game_selection: all_available
max_game_retries: 0
max_actions_per_level: 100

agent_action_history_window: 10
animation_keyframe_pixel_threshold: 20
action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3
candidate_action_count: 8

reward_lp_weight_start: 0.60
reward_lp_weight_end: 0.15
reward_progress_bonus: 8.0

reward_action_penalty: 0.015
reward_trace_seconds_penalty: 0.0
reward_input_token_penalty_per_1k: 0.0001
reward_output_token_penalty_per_1k: 0.0007

models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8

    input_image_size: 2048x2048
    input_image_resample: nearest
    input_image_crop_arc_grid_edges: 3

    timeout: 600
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 1
    temperature: 0.0
    top_p: 1.0

    options:
      chat_template_kwargs:
        enable_thinking: false

    server:
      host: 127.0.0.1
      port: 8000
      max_model_len: 32768
      reasoning_parser: qwen3


      extra_args:
        - --gpu-memory-utilization
        - "0.90"
        - --max-num-seqs
        - "64"
        - --max-num-batched-tokens
        - "65536"
        - --enable-prefix-caching
        - --gdn-prefill-backend
        - triton
        - --chat-template-content-format
        - openai
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - "{}"

  agent:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    temperature: 0.15
    options:
      chat_template_kwargs:
        enable_thinking: false

  change:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    options:
      chat_template_kwargs:
        enable_thinking: false

  memory:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
    options:
      chat_template_kwargs:
        enable_thinking: false

  world:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
    options:
      chat_template_kwargs:
        enable_thinking: false

  goal:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    options:
      chat_template_kwargs:
        enable_thinking: false

  interest:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    options:
      chat_template_kwargs:
        enable_thinking: false

  reward_judge:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024
    options:
      chat_template_kwargs:
        enable_thinking: false
