# Modal H100 full game-loop run: X, S, and active P updater slots share one
# vLLM-served Qwen3.6 FP8 model. Goal G remains dormant in normal runtime.
game_index: 3
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true

enable_visualization: false
render_mode: null
debug_trace: null
debug_color: never

action_history_window: 20
max_actions_per_level: 100

models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    base_url: http://127.0.0.1:8000/v1
    api_key: EMPTY
    input_image_size: 1024x1024
    input_image_resample: nearest
    temperature: 0
    server:
      host: 127.0.0.1
      port: 8000
      max_model_len: 8192
      reasoning_parser: qwen3
      extra_args:
        - --gdn-prefill-backend
        - triton
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
  agent:
    backend: vllm
    max_tool_calls: 0
    repair_attempts: 2
    temperature: 0.3
    include_output_schema_in_instructions: true
  world:
    backend: vllm
    include_output_schema_in_instructions: true
  updater:
    world:
      backend: vllm
      include_output_schema_in_instructions: true
    agent:
      backend: vllm
      include_output_schema_in_instructions: true
    general:
      backend: vllm
      include_output_schema_in_instructions: true
