# Modal H100 full game-loop run: Agent X, transition change summaries, and
# active P updater slots share one vLLM-served Qwen3.6 FP8 model.
game_index: 3
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true

enable_visualization: false
render_mode: null
debug_trace: null
debug_color: never

# testing history sizes, reasoning, etc.

agent_action_history_window: 10
agent_updater_action_history_window: 20

agent_context_history_window: 10
max_actions_per_level: 300

action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

models:
  observation_text:
    crop_cells: 3
    overflow_chars_per_frame: 12000
    include_rows: true
    include_component_runs: true
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    input_image_size: 2048x2048
    temperature: 0.1
    server:
      host: 127.0.0.1
      port: 8000
      max_model_len: 16384
      reasoning_parser: qwen3
      extra_args:
        - --gdn-prefill-backend
        - triton
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
  agent:
    backend: vllm
    include_output_schema_in_instructions: false
    max_tool_calls: 0
    repair_attempts: 1
    options:
      temperature: 0.2
      thinking_token_budget: 256
      chat_template_kwargs:
        enable_thinking: false
  change:
    backend: vllm
    include_output_schema_in_instructions: false
  historizer:
    backend: vllm
    include_output_schema_in_instructions: false
  updater:
    general:
      backend: vllm
      include_output_schema_in_instructions: false
    agent:
      backend: vllm
      include_output_schema_in_instructions: false
      options:
        temperature: 0.2
        thinking_token_budget: 512
        chat_template_kwargs:
          enable_thinking: false
