# H100 public-game debug run: a public batch runs concurrently against
# one shared local vLLM-served Qwen3.6 FP8 model.
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: /vol/runs/recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never
live_turn_monitor: true

max_actions_per_level: 1000
max_parallel_games: 25
max_game_retries: 0
game_selection: all_available

agent_action_history_window: 10
agent_updater_action_history_window: 20
agent_context_history_window: 10

animation_keyframe_pixel_threshold: 80
action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

models:
  observation_text:
    crop_cells: 3
    overflow_chars_per_frame: 12000
    include_rows: true
    include_components: true
    include_component_runs: true
    compact_components: true
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    input_image_size: 1024x1024
    timeout: 600
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.0
    server:
      host: 127.0.0.1
      port: 8000
      max_model_len: 65536
      reasoning_parser: qwen3
      extra_args:
        - --gpu-memory-utilization
        - "0.95"
        - --max-num-seqs
        - "25"
        - --gdn-prefill-backend
        - triton
        - --max-num-batched-tokens
        - "65536"
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - "{}"
  agent:
    backend: vllm
    include_output_schema_in_instructions: false
    options:
      temperature: 0.2
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  change:
    backend: vllm
    include_output_schema_in_instructions: false
    summary_max_chars: 8000
    repair_invalid_output_preview_chars: 8000
    max_frames_per_call: 8
    reduce_chunk_summaries: true
    reducer_keyframe_limit: 8
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  historizer:
    backend: vllm
    include_output_schema_in_instructions: false
    field_evolution_max_chars: 8000
    repair_invalid_output_preview_chars: 8000
    options:
      thinking_token_budget: 256
      chat_template_kwargs:
        enable_thinking: true
  updater:
    general:
      backend: vllm
      include_output_schema_in_instructions: false
      general_context_max_chars: 20000
      repair_invalid_output_preview_chars: 8000
    agent:
      backend: vllm
      include_output_schema_in_instructions: false
      agent_game_context_max_chars: 12000
      agent_game_context_field_max_chars: 6000
      repair_invalid_output_preview_chars: 12000
      options:
        temperature: 0.2
        thinking_token_budget: 2048
        chat_template_kwargs:
          enable_thinking: true
