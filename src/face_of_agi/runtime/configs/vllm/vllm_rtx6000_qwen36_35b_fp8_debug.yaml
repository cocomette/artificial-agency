# Kaggle RTX 6000 public-game debug run: a small public batch runs
# concurrently against one shared local vLLM-served Qwen3.6 FP8 model.
operation_mode: offline
game_catalog_path: /kaggle/input/face-of-agi-public-games/local_games.json
environments_dir: /kaggle/input/face-of-agi-public-games/environment_files
recordings_dir: /kaggle/working/recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never
live_turn_monitor: true

# Explicitly run all games concurrently.
max_parallel_games: null
game_selection: all_available

# Avoid retry collisions with per-game LoRA adapter dirs.
max_game_retries: 0

# Give LoRA enough post-update runway, but keep an upper bound.
max_actions_per_level: 100

agent_action_history_window: 8

# Lower than 30; small animations can matter.
animation_keyframe_pixel_threshold: 20

# Now acceptable after coordinate-sensitive ACTION6 suppression.
action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

# Throughput-critical. Full action games get ~6 simple actions + 2 coordinate clicks.
# Raise to 10 only if ACTION6 exploration is visibly too weak.
candidate_action_count: 8

# Delayed LP should matter, but task completion must dominate when it appears.
reward_lp_weight_start: 0.60
reward_lp_weight_end: 0.15
reward_progress_bonus: 8.0

# Small costs: enough to shape LoRA replay, not enough to suppress exploration.
reward_action_penalty: 0.015
reward_trace_seconds_penalty: 0.0
reward_input_token_penalty_per_1k: 0.0001
reward_output_token_penalty_per_1k: 0.0007

models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8

    # 512 gives 8 px per ARC cell. This is the right speed/visibility tradeoff
    # for 25 games in parallel. Use 640 only if coordinate targeting fails.
    input_image_size: 512x512
    input_image_resample: nearest
    input_image_crop_arc_grid_edges: 3

    timeout: 600
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 1
    temperature: 0.0
    top_p: 1.0

    options:
      chat_template_kwargs:
        enable_thinking: false

    server:
      host: 127.0.0.1
      port: 8000
      model_path: /kaggle/input/face-of-agi-qwen36-35b-fp8-weights
      max_model_len: 16384
      reasoning_parser: qwen3

      enable_lora: true

      # vLLM preallocates GPU memory for these LoRA slots at startup. Keep the
      # GPU slot count small enough for the 35B FP8 model on a 95 GiB RTX 6000;
      # loaded adapters can still spill through --max-cpu-loras below.
      max_loras: 8
      max_lora_rank: 8
      allow_runtime_lora_updating: true

      extra_args:
        # Leave GPU headroom for the warm HF LoRA trainer that co-resides with
        # vLLM during shared online updates.
        - --gpu-memory-utilization
        - "0.65"

        # Conservative first-pass KV/concurrency budget for trainer coexistence.
        - --max-num-seqs
        - "16"
        - --max-num-batched-tokens
        - "8192"

        # Useful when many role prompts share instruction prefixes.
        - --enable-prefix-caching

        # Helps avoid hard failures when many adapters accumulate.
        # Remove only if your vLLM version rejects this flag.
        - --max-cpu-loras
        - "512"

        - --chat-template-content-format
        - openai
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - "{}"

  agent:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    temperature: 0.15
    options:
      chat_template_kwargs:
        enable_thinking: false

  change:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    options:
      chat_template_kwargs:
        enable_thinking: false

  memory:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
    options:
      chat_template_kwargs:
        enable_thinking: false

  world:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
    options:
      chat_template_kwargs:
        enable_thinking: false

  goal:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    options:
      chat_template_kwargs:
        enable_thinking: false

  interest:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    options:
      chat_template_kwargs:
        enable_thinking: false

  reward_judge:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024
    options:
      chat_template_kwargs:
        enable_thinking: false

online_lora:
  enabled: true

  # Use the local offline model path.
  base_model: Qwen/Qwen3.6-35B-A3B-FP8
  base_model_path: /kaggle/input/face-of-agi-qwen36-35b-fp8-weights
  trainer_base_model_path: /kaggle/input/face-of-agi-qwen36-35b-trainable-weights
  trainer_local_files_only: true
  trainer_quantization: bnb_4bit
  adapter_root: /kaggle/working/runs/lora

  # Shared update batch across games: train on up to 8 turn bundles, with a
  # small rolling evaluation reserve per contributor.
  update_interval_turns: 4
  min_new_samples_per_update: 8
  max_update_wait_seconds: 30.0
  max_train_samples: 8
  held_out_recent_samples: 2
  trainer_cache_enabled: false
  trainer_device_map: cuda:0
  trainer_torch_dtype: auto
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

  # Tiny updates only. The goal is online steering, not full convergence.
  train_batch_size: 2
  train_epochs: 1
  max_update_steps: 2

  # Interest/Agent GRPO only. World is SFT in your new code.
  grpo_num_generations: 2
  max_completion_tokens: 256

  learning_rate: 1.0e-5
  learning_progress_min: -0.25
  learning_progress_max: 0.25
