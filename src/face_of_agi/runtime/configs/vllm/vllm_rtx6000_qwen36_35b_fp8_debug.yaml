# Kaggle RTX 6000 public-game debug run: a small public batch runs
# concurrently against one shared local vLLM-served Qwen3.6 FP8 model.
operation_mode: offline
game_catalog_path: /kaggle/input/face-of-agi-public-games/local_games.json
environments_dir: /kaggle/input/face-of-agi-public-games/environment_files
recordings_dir: /kaggle/working/recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never
live_turn_monitor: true

max_parallel_games: 25
max_game_retries: 0
game_selection: all_available

agent_action_history_window: 10
agent_context_history_window: 10
agent_updater_action_history_window: 20

animation_keyframe_pixel_threshold: 20
max_actions_per_level: 1000

action_suppression_zero_changed_pixel_turns: 3
updater_stagnation_warning_zero_changed_pixel_turns: 3

models:
  scheduler:
    enabled: true
    max_concurrent_calls: 16
    max_concurrent_calls_per_game: 1
    queue_policy: fifo
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    input_image_size: 2048x2048
    input_image_resample: nearest
    timeout: 600
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.0
    server:
      host: 127.0.0.1
      port: 8000
      model_path: /kaggle/input/face-of-agi-qwen36-35b-fp8-weights
      max_model_len: 65536
      reasoning_parser: qwen3
      extra_args:
        - --gpu-memory-utilization
        - "0.95"
        - --max-num-seqs
        - "16"
        - --max-num-batched-tokens
        - "65536"
        - --disable-log-stats
        - --disable-uvicorn-access-log
        - --default-chat-template-kwargs
        - '{"enable_thinking": false}'
        - --reasoning-config
        - "{}"
  agent:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    action6_targeting_mode: bbox_color
    include_output_schema_in_instructions: false
    options:
      temperature: 0.2
      thinking_token_budget: 512
      chat_template_kwargs:
        enable_thinking: true
  change:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    activate_components: true
    persist_changed_elements_only: true
    max_nb_components: 50
    summary_max_elements: 50
    max_frames_per_call: 10
    summary_max_chars: 8000
    repair_invalid_output_preview_chars: 8000
    include_output_schema_in_instructions: false
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  historizer:
    backend: vllm
    field_max_chars: 8000
    repair_invalid_output_preview_chars: 8000
    include_output_schema_in_instructions: false
    options:
      thinking_token_budget: 256
      chat_template_kwargs:
        enable_thinking: true
  memory:
    backend: vllm
    input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
    memory_max_chars: 12000
    repair_invalid_output_preview_chars: 12000
    options:
      thinking_token_budget: 1024
      chat_template_kwargs:
        enable_thinking: true
  updater:
    general:
      backend: vllm
      general_context_max_chars: 20000
      repair_invalid_output_preview_chars: 8000
      include_output_schema_in_instructions: false
    agent:
      backend: vllm
      input_image_crop_box_normalized: [0.046875, 0.046875, 0.953125, 0.953125]
      agent_game_context_max_chars: 12000
      agent_game_context_field_max_chars: 6000
      repair_invalid_output_preview_chars: 12000
      include_output_schema_in_instructions: false
      options:
        temperature: 0.2
        thinking_token_budget: 2048
        chat_template_kwargs:
          enable_thinking: true
