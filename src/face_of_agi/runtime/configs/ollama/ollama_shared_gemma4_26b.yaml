# Local public-game debug run: one public game runs against one shared
# Ollama-hosted Gemma 4 model.
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true
enable_visualization: false
render_mode: null
debug_trace: off
debug_color: never
live_turn_monitor: true
max_actions_per_level: 100

max_game_retries: 1
game_ids:
  - ls20-9607627b

agent_action_history_window: 10
action_history_window: 20
agent_context_history_window: 10
probing_actions_window: 1
policy_actions_window: 1

max_levels_per_game: 2

models:
  shared_vlm:
    backend: ollama
    model: gemma4:26b
    keep_alive: 30m
    think: false
    max_tool_calls: 0
    repair_attempts: 3
    temperature: 0.1
    num_ctx: 8192
  agent:
    backend: ollama
    input_image_size: 2048x2048
    input_image_resample: nearest
    include_output_schema_in_instructions: true
    max_tool_calls: 0
    options:
      temperature: 0.2
  change:
    backend: ollama
    think: false
    input_image_size: 2048x2048
    input_image_resample: nearest
    input_image_crop_arc_grid_edges: 3
    include_output_schema_in_instructions: true
  world:
    backend: ollama
    think: true
    input_image_size: 2048x2048
    input_image_resample: nearest
    input_image_crop_arc_grid_edges: 3
    include_output_schema_in_instructions: true
  historizer:
    backend: ollama
    think: false
    include_output_schema_in_instructions: true
  level_summary:
    backend: ollama
    think: false
    include_output_schema_in_instructions: true
  updater:
    general:
      backend: ollama
      input_image_size: 2048x2048
      input_image_resample: nearest
      input_image_crop_arc_grid_edges: 3
      include_output_schema_in_instructions: true
    agent_probing:
      backend: ollama
      think: false
      input_image_size: 2048x2048
      input_image_resample: nearest
      input_image_crop_arc_grid_edges: 3
      include_output_schema_in_instructions: true
      options:
        temperature: 0.2
    agent_policy:
      backend: ollama
      think: true
      input_image_size: 2048x2048
      input_image_resample: nearest
      input_image_crop_arc_grid_edges: 3
      include_output_schema_in_instructions: true
      options:
        temperature: 0.2
