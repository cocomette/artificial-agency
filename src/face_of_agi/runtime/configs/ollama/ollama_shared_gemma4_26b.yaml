# Modal H100 full game-loop run: X, S, G, and all P updater slots share one
# Ollama-hosted Gemma model.
game_index: 3
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true

enable_visualization: false
render_mode: null
debug_trace: null
debug_color: never

action_history_window: 3
max_actions_per_level: 100

models:
  shared_vlm:
    backend: ollama
    model: gemma4:26b
    keep_alive: 30m
    think: false
    temperature: 0
    num_ctx: 8192
  agent:
    backend: ollama
    input_image_size: 1024x1024
    max_tool_calls: 0
    repair_attempts: 2
    include_output_schema_in_instructions: true
    options:
      temperature: 0.3
  world:
    backend: ollama
    input_image_size: 1024x1024
    include_output_schema_in_instructions: true
  goal:
    backend: ollama
    input_image_size: 1024x1024
    include_output_schema_in_instructions: true
  updater:
    world:
      backend: ollama
      input_image_size: 1024x1024
      include_output_schema_in_instructions: true
    goal:
      backend: ollama
      input_image_size: 1024x1024
      include_output_schema_in_instructions: true
      options:
        temperature: 0.5
    agent:
      backend: ollama
      input_image_size: 1024x1024
      include_output_schema_in_instructions: true
    general:
      backend: ollama
      input_image_size: 1024x1024
      include_output_schema_in_instructions: true
