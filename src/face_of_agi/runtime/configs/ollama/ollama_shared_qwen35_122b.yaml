# v1 vLLM regression config retained under the legacy Ollama folder.
# Active model roles use the vLLM schema; Ollama backend keys are absent.
game_index: 3
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true

enable_visualization: false
render_mode: null
debug_trace: model_inputs
debug_color: always

agent_action_history_window: 5
agent_updater_action_history_window: 5
agent_context_history_window: 8
max_actions_per_level: 50

models:
  shared_vlm:
    backend: vllm
    model: Qwen/Qwen3.6-35B-A3B-FP8
    input_image_size: 1024x1024
    input_image_resample: nearest
    timeout: 1200
    max_retries: 0
    max_tool_calls: 0
    repair_attempts: 1
    temperature: 0.1
  agent:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
    max_tool_calls: 0
    repair_attempts: 1
    options:
      temperature: 0.2
  change:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  memory:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 3072
  world:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  goal:
    backend: vllm
    include_output_schema_in_instructions: true
    max_completion_tokens: 2048
  interest:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024
  reward_judge:
    backend: vllm
    input_image_crop_arc_grid_edges: 4
    include_output_schema_in_instructions: true
    max_completion_tokens: 1024

online_lora:
  enabled: true
  update_interval_turns: 4
  max_train_samples: 16
  held_out_recent_samples: 8
  learning_progress_min: -1.0
  learning_progress_max: 1.0
  grpo_num_generations: 4
  max_completion_tokens: 512
