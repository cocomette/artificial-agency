# Fully local model run: Ollama X, S/G descriptions, and updater tasks.
game_index: 0
max_actions_per_level: 3
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
enable_visualization: true
render_mode: terminal
seed: 0
save_recording: false
experimental_memory_turn_buffer: 4
debug_keep_all_m_states: true
debug_trace: minimal
debug_color: auto
models:
  agent:
    backend: ollama
    model: gemma4:e4b
    max_tool_calls: 0
    repair_attempts: 1
  world:
    backend: ollama
    model: gemma4:e4b
    input_image_size: 256x256
  goal:
    backend: ollama
    model: gemma4:e4b
    input_image_size: 256x256
  updater:
    world:
      backend: ollama
      model: gemma4:e4b
    goal:
      backend: ollama
      model: gemma4:e4b
    agent:
      backend: ollama
      model: gemma4:e4b
    general:
      backend: ollama
      model: gemma4:e4b
