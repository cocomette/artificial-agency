# Ollama-hosted Qwen model.
game_index: 3
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
seed: 0
save_recording: false
use_learned_contexts: false
experimental_memory_turn_buffer: 1
debug_keep_all_m_states: true

enable_visualization: false
render_mode: null
debug_trace: null
debug_color: never

agent_action_history_window: 3
action_history_window: 3
agent_context_history_window: 8
probing_actions_window: 1
policy_actions_window: 1
max_actions_per_level: 100

models:
  shared_vlm:
    backend: ollama
    model: qwen3.6:27b
    keep_alive: 30m
    think: false
    temperature: 0
    num_ctx: 8192
  agent:
    backend: ollama
    input_image_size: 1024x1024
    max_tool_calls: 0
    repair_attempts: 2
    options:
      temperature: 0.3
  change:
    backend: ollama
    input_image_size: 1024x1024
  world:
    backend: ollama
  historizer:
    backend: ollama
  level_summary:
    backend: ollama
  updater:
    agent_probing:
      backend: ollama
      input_image_size: 1024x1024
    agent_policy:
      backend: ollama
      input_image_size: 1024x1024
    general:
      backend: ollama
      input_image_size: 1024x1024
