# Minimal local Ollama dashboard run for exercising the full game loop.
# X, S, G, and all P updater slots use gemma4:26b.
game_index: 3
seed: 0
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
enable_visualization: false
save_recording: false
use_learned_contexts: false
render_mode: null

max_actions_per_level: 100
experimental_memory_turn_buffer: 2
action_history_window: 3

debug_keep_all_m_states: true
debug_trace: verbose
debug_color: always

models:
  agent:
    backend: ollama
    model: gemma4:26b
    max_tool_calls: 0
    repair_attempts: 3
  world:
    backend: ollama
    model: gemma4:26b
    input_image_size: 256x256
    input_image_resample: nearest
  goal:
    backend: ollama
    model: gemma4:26b
    input_image_size: 256x256
    input_image_resample: nearest
  updater:
    world:
      backend: ollama
      model: gemma4:26b
    goal:
      backend: ollama
      model: gemma4:26b
    agent:
      backend: ollama
      model: gemma4:26b
    general:
      backend: ollama
      model: gemma4:26b
