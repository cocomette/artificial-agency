game_index: 3
seed: 0
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
enable_visualization: true
save_recording: false
render_mode: human
max_actions_per_level: 10
experimental_memory_turn_buffer: 2
agent_action_history_window: 3
action_history_window: 3
debug_keep_all_m_states: true
debug_trace: verbose
debug_color: always
models:
  agent:
    backend: openai
    model: gpt-5-nano
    input_image_size: 1024x1024
    input_image_resample: nearest
    max_tool_calls: 0
    repair_attempts: 1
    reasoning:
      effort: low
      summary: auto
  change:
    backend: openai
    model: gpt-5-nano
    input_image_size: 1024x1024
    input_image_resample: nearest
    reasoning:
      effort: low
  compacter:
    backend: openai
    model: gpt-5-nano
    reasoning:
      effort: low
  updater:
    agent:
      backend: openai
      model: gpt-5-nano
      reasoning:
        effort: low
compacter_action_history_window: 20
updater_actions_window: 1
