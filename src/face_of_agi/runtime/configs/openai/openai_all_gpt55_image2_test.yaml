# Hosted OpenAI quality-oriented test run for exercising the active game loop.
# X, change summary, historizer, and active P updater slots use gpt-5.5.
game_index: 3
seed: 0
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
enable_visualization: true
save_recording: false
render_mode: human

max_actions_per_level: 20
use_learned_contexts: false
experimental_memory_turn_buffer: 2
agent_action_history_window: 5
action_history_window: 5
agent_context_history_window: 8
probing_actions_window: 1
policy_actions_window: 1

debug_keep_all_m_states: true
debug_trace: agent_decision
debug_color: always

models:
  agent:
    backend: openai
    model: gpt-5.5
    input_image_size: 1024x1024
    input_image_resample: nearest
    max_tool_calls: 0
    repair_attempts: 1
    reasoning:
      effort: medium
      summary: auto
  change:
    backend: openai
    model: gpt-5.5
    input_image_size: 1024x1024
    input_image_resample: nearest
    reasoning:
      effort: medium
  world:
    backend: openai
    model: gpt-5.5
    reasoning:
      effort: medium
  historizer:
    backend: openai
    model: gpt-5.5
    reasoning:
      effort: medium
  level_summary:
    backend: openai
    model: gpt-5.5
    reasoning:
      effort: medium
  updater:
    agent_probing:
      backend: openai
      model: gpt-5.5
      reasoning:
        effort: medium
    agent_policy:
      backend: openai
      model: gpt-5.5
      reasoning:
        effort: medium
    general:
      backend: openai
      model: gpt-5.5
      reasoning:
        effort: medium
