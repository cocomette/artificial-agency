# First run `--list-games`, which writes the indexed game catalog file.
# This config intentionally uses real providers for every active model role.
game_index: 0
max_actions_per_level: 10
operation_mode: offline
game_catalog_path: src/face_of_agi/environment/local_games.json
environments_dir: environment_files
recordings_dir: recordings
enable_visualization: true
render_mode: human
seed: 0
save_recording: false
experimental_memory_turn_buffer: 2
agent_action_history_window: 8
action_history_window: 8
agent_context_history_window: 8
probing_actions_window: 1
policy_actions_window: 1
debug_keep_all_m_states: false
debug_trace: minimal
debug_color: auto
models:
  agent:
    backend: openai
    model: gpt-5-nano
    input_image_size: 1024x1024
    input_image_resample: nearest
    max_tool_calls: 0
    repair_attempts: 1
    reasoning:
      effort: low
      summary: auto
  change:
    backend: openai
    model: gpt-5-nano
    input_image_size: 1024x1024
    input_image_resample: nearest
    reasoning:
      effort: low
  world:
    backend: openai
    model: gpt-5-nano
    reasoning:
      effort: low
  historizer:
    backend: openai
    model: gpt-5-nano
    reasoning:
      effort: low
  level_summary:
    backend: openai
    model: gpt-5-nano
    reasoning:
      effort: low
  updater:
    agent_probing:
      backend: openai
      model: gpt-5-nano
      reasoning:
        effort: low
    agent_policy:
      backend: openai
      model: gpt-5-nano
      reasoning:
        effort: low
    general:
      backend: openai
      model: gpt-5-nano
      reasoning:
        effort: low
